// Æther Agent Interop Spec v1 — Machine-readable protobuf definition.
//
// This is the canonical wire format. Any runtime that speaks ttrpc
// with these messages can plug into an Æther Agent.
//
// See AETHER-INTEROP-v1.md for the human-readable spec.

syntax = "proto3";
package aether.interop.v1;

import "google/protobuf/empty.proto";

// ─── Core service (same as aether.proto) ───

service AetherAgent {
    rpc RegisterAddIn(AddInRequest) returns (AddInResponse);
    rpc MaterializePath(MaterializeRequest) returns (MaterializeResponse);
    rpc UpdateProxyRules(ProxyRules) returns (google.protobuf.Empty);
    rpc GetManifest(GetManifestRequest) returns (ManifestResponse);
    rpc StreamLogs(LogRequest) returns (stream LogResponse);
}

// ─── Messages ───

message AddInRequest {
    string name = 1;
    string version = 2;
    bytes manifest_toml = 3;
    string content_address = 4;
}

message AddInResponse {
    bool success = 1;
    string addin_id = 2;
    string error = 3;
}

message MaterializeRequest {
    string addin_id = 1;
    string path = 2;
}

message MaterializeResponse {
    bool success = 1;
    string host_path = 2;
    string error = 3;
}

message ProxyRules {
    repeated ProxyRule rules = 1;
}

message ProxyRule {
    string match_pattern = 1;
    string credential_key = 2;
    string target_address = 3;
}

message GetManifestRequest {
    string addin_id = 1;
}

message ManifestResponse {
    string addin_id = 1;
    string name = 2;
    string version = 3;
    repeated EffectEntry effects = 4;
    repeated string binaries = 5;
    repeated string libraries = 6;
}

message EffectEntry {
    string binary_name = 1;
    string shim_library = 2;
    map<string, string> env = 3;
}

message LogRequest {
    string addin_id = 1;
    string level = 2;
}

message LogResponse {
    string timestamp = 1;
    string level = 2;
    string message = 3;
    string addin_id = 4;
}

// ─── Sidecar HTTP Gateway (for non-ttrpc runtimes) ───
//
// The gateway exposes these as REST endpoints:
//
//   POST /v1/addins              → RegisterAddIn
//   POST /v1/materialize         → MaterializePath
//   PUT  /v1/proxy-rules         → UpdateProxyRules
//   GET  /v1/addins/{id}         → GetManifest
//   GET  /v1/logs?addin={id}     → StreamLogs (SSE)
//
// JSON encoding uses standard protobuf-JSON mapping.
