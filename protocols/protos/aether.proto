// Core ttrpc service for the Æther Agent AOE (Agentic Operating Environment).
// Manages add-in packages, effect materialization, and credential hallucination.

syntax = "proto3";
package aether;

import "google/protobuf/empty.proto";

service AetherAgent {
    // Register a new add-in package with its manifest and effects.
    rpc RegisterAddIn(AddInRequest) returns (AddInResponse);

    // Lazily materialize a file path from a registered add-in's content store.
    rpc MaterializePath(MaterializeRequest) returns (MaterializeResponse);

    // Update proxy/credential routing rules for the eBPF hallucinator.
    rpc UpdateProxyRules(ProxyRules) returns (google.protobuf.Empty);

    // Retrieve the parsed manifest for a registered add-in.
    rpc GetManifest(GetManifestRequest) returns (ManifestResponse);

    // Stream realtime logs from add-in execution.
    rpc StreamLogs(LogRequest) returns (stream LogResponse);
}

// ─── RegisterAddIn ───

message AddInRequest {
    string name = 1;
    string version = 2;
    bytes manifest_toml = 3;       // raw TOML manifest content
    string content_address = 4;    // CAS address for lazy materialization
}

message AddInResponse {
    bool success = 1;
    string addin_id = 2;
    string error = 3;
}

// ─── MaterializePath ───

message MaterializeRequest {
    string addin_id = 1;
    string path = 2;               // relative path within the package
}

message MaterializeResponse {
    bool success = 1;
    string host_path = 2;          // where the file was materialized
    string error = 3;
}

// ─── UpdateProxyRules ───

message ProxyRules {
    repeated ProxyRule rules = 1;
}

message ProxyRule {
    string match_pattern = 1;      // hostname glob, e.g. "*.dropbox.com"
    string credential_key = 2;     // key in eBPF credential map
    string target_address = 3;     // optional: rewrite destination
}

// ─── GetManifest ───

message GetManifestRequest {
    string addin_id = 1;
}

message ManifestResponse {
    string addin_id = 1;
    string name = 2;
    string version = 3;
    repeated EffectEntry effects = 4;
    repeated string binaries = 5;
    repeated string libraries = 6;
}

message EffectEntry {
    string binary_name = 1;        // command that triggers this effect, e.g. "gh"
    string shim_library = 2;       // LD_PRELOAD .so path, e.g. "libgh_shim.so"
    map<string, string> env = 3;   // additional env vars for this effect
}

// ─── StreamLogs ───

message LogRequest {
    string addin_id = 1;
    string level = 2;              // "debug", "info", "warn", "error"
}

message LogResponse {
    string timestamp = 1;
    string level = 2;
    string message = 3;
    string addin_id = 4;
}
