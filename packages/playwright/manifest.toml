# Æther Agent — Playwright add-in manifest

[package]
name = "playwright"
version = "1.49.0"
description = "Playwright browser automation with lazy-materialized Chromium"
content_address = "sha256:playwright-1.49.0"

[[effects]]
binary_name = "playwright"
shim_library = "/usr/lib/aether/shims/libplaywright_shim.so"
tool_type = "native"
description = "Playwright browser automation — navigate pages, click elements, take screenshots. Chromium is materialized on first use."
examples = [
    "playwright open https://example.com",
    "playwright screenshot --url https://example.com --output page.png",
    "playwright codegen https://example.com",
]
capabilities = ["browser", "screenshot", "scrape", "automate", "pdf"]

[effects.env]
PLAYWRIGHT_BROWSERS_PATH = "/usr/lib/aether/playwright/browsers"
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[[binaries]]
path = "usr/bin/playwright"
source = "lazy"

[[binaries]]
path = "usr/lib/aether/playwright/browsers/chromium/chrome"
source = "lazy"

[[libraries]]
path = "usr/lib/aether/playwright/browsers/chromium/libEGL.so"
source = "lazy"

[[libraries]]
path = "usr/lib/aether/playwright/browsers/chromium/libGLESv2.so"
source = "lazy"
