# Æther Agent — Python Excel (openpyxl) add-in manifest

[package]
name = "python-excel"
version = "3.1.5"
description = "Python with openpyxl for Excel file manipulation"
content_address = "sha256:python-excel-3.1.5"

[[effects]]
binary_name = "python3"
shim_library = "/usr/lib/aether/shims/libpyexcel_shim.so"
tool_type = "native"
description = "Python 3 with openpyxl pre-installed — read, write, modify Excel spreadsheets."
examples = [
    "python3 -c \"import openpyxl; wb = openpyxl.load_workbook('data.xlsx'); print(wb.sheetnames)\"",
    "python3 transform.py --input data.xlsx --output report.xlsx",
]
capabilities = ["excel", "spreadsheet", "xlsx", "csv", "python"]

[effects.env]
PYTHONPATH = "/usr/lib/aether/python-excel/lib"

[[binaries]]
path = "usr/bin/python3"
source = "lazy"

[[libraries]]
path = "usr/lib/aether/python-excel/lib/openpyxl/__init__.py"
source = "lazy"
