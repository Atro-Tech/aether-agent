# Æther Agent — IMAP scraper add-in manifest

[package]
name = "imap-scraper"
version = "0.3.0"
description = "IMAP email scraper with credential hallucination"
content_address = "sha256:imap-scraper-0.3.0"

[[effects]]
binary_name = "imap-scraper"
shim_library = "/usr/lib/aether/shims/libimap_shim.so"
tool_type = "shimmed"
description = "IMAP email access — search, read, download attachments. Credentials are injected at the network level; the tool never sees real passwords."
examples = [
    "imap-scraper search --from boss@company.com --since 2024-01-01",
    "imap-scraper download --folder INBOX --output ./emails/",
    "imap-scraper list-folders",
]
capabilities = ["email", "imap", "search", "attachments", "download"]

[effects.env]
IMAP_CREDENTIAL_SOURCE = "ebpf:imap-password"

[[binaries]]
path = "usr/bin/imap-scraper"
source = "lazy"

[proxy_rules]
[[proxy_rules.rules]]
match_pattern = "*.gmail.com"
credential_key = "imap-password"

[[proxy_rules.rules]]
match_pattern = "imap.*"
credential_key = "imap-password"
