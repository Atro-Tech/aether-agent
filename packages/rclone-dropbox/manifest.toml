# Æther Agent — rclone Dropbox add-in manifest

[package]
name = "rclone-dropbox"
version = "1.68.0"
description = "rclone with Dropbox credential hallucination"
content_address = "sha256:rclone-1.68.0"

[[effects]]
binary_name = "rclone"
shim_library = "/usr/lib/aether/shims/librclone_shim.so"
tool_type = "hybrid"
description = "rclone file sync for Dropbox — upload, download, sync files. OAuth tokens injected automatically."
examples = [
    "rclone copy ./report.pdf dropbox:reports/",
    "rclone ls dropbox:documents/",
    "rclone sync ./output dropbox:project-output/",
]
capabilities = ["file-sync", "upload", "download", "dropbox"]

[effects.env]
RCLONE_CONFIG_SOURCE = "ebpf:dropbox-oauth"

[[binaries]]
path = "usr/bin/rclone"
source = "lazy"

[proxy_rules]
[[proxy_rules.rules]]
match_pattern = "*.dropboxapi.com"
credential_key = "dropbox-oauth"

[[proxy_rules.rules]]
match_pattern = "content.dropboxapi.com"
credential_key = "dropbox-oauth"
